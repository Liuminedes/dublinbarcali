<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e1a0c"/>
      <stop offset="100%" stop-color="#0a0806"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8c96a"/>
      <stop offset="100%" stop-color="#a87830"/>
    </linearGradient>
  </defs>
  <!-- Fondo redondeado oscuro -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Borde dorado -->
  <rect x="1" y="1" width="30" height="30" rx="6.2" fill="none" stroke="url(#gold)" stroke-width="0.8" opacity="0.6"/>
  <!-- Shamrock centrado -->
  <text x="16" y="22" text-anchor="middle" font-size="18" fill="url(#gold)">☘</text>
</svg>